name: "Task"
description: "일반 작업 (인프라, 리팩토링, 문서화 등)"
title: "[Task] "
labels: ["type:task"]
body:
  - type: markdown
    attributes:
      value: |
        ## 작업 등록
        기능 개발 외 일반 작업을 등록합니다.

  - type: dropdown
    id: category
    attributes:
      label: "카테고리"
      options:
        - "인프라/CI-CD"
        - "리팩토링"
        - "문서화"
        - "테스트"
        - "의존성 업데이트"
        - "기타"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      options:
        - "P0 - 긴급"
        - "P1 - 높음"
        - "P2 - 보통"
        - "P3 - 낮음"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "작업 설명"
      description: "수행할 작업을 상세히 설명하세요."
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: "체크리스트"
      description: "완료해야 할 하위 작업을 나열하세요."
      placeholder: |
        - [ ] 항목 1
        - [ ] 항목 2
    validations:
      required: false
